<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>與開發處同步（Sync with dev）</title>
<style>
  :root{ --border:#e5e7eb; --muted:#6b7280; --bg:#f9fafb; --blue:#2563eb; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif; color:#1f2937; background:var(--bg); }
  .page{ max-width:560px; margin:0 auto; padding:14px; }
  h1{ font-size:20px; margin:0 0 2px; }
  .muted{ color:var(--muted); font-size:13px; }
  .card{ background:#fff; border:1px solid var(--border); border-radius:12px; padding:14px; margin-top:12px; }
  label{ display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  input[type=password],input[type=text]{ font:inherit; padding:8px 10px; border:1px solid var(--border); border-radius:8px; width:100%; }
  button{ font:inherit; cursor:pointer; border-radius:8px; border:1px solid var(--border); background:#fff; padding:9px 14px; margin-top:14px; }
  button.primary{ background:var(--blue); color:#fff; border-color:var(--blue); }
  button:disabled{ opacity:.6; cursor:not-allowed; }
  .status{ color:var(--muted); padding:12px 0; }
  .err{ color:#b91c1c; }
  .ok{ color:#15803d; }
  pre{ background:#f3f4f6; border-radius:8px; padding:10px; overflow:auto; font-size:12px; }
  footer{ color:var(--muted); font-size:11px; margin-top:10px; text-align:center; }
</style>
</head>
<body>
<div class="page">
  <h1>與開發處同步</h1>
  <div class="muted">把 Base44 的 DPC 休假資料灌進開發處系統（D1）。Base44 為主，DPC 同仁在「我的排休」上的編輯會被覆蓋。</div>

  <div class="card">
    <!-- ⚠️ 部署後若 Worker 不同網域，可用 ?api=... 覆蓋。 -->
    <label for="secret">通關密語（SYNC_SECRET）</label>
    <input id="secret" type="password" placeholder="輸入 Worker 設定的 SYNC_SECRET" autocomplete="off" />
    <button id="go" class="primary">立即同步（Sync with dev）</button>
    <div id="out" class="status"></div>
  </div>

  <footer>定時同步每 30 分鐘自動執行；此頁僅供需要「立即強制」時手動觸發。</footer>
</div>

<script>
const API_BASE = (new URLSearchParams(location.search).get('api')
  || 'https://workforcemanagement.ellyfd.workers.dev').replace(/\/+$/, '');

const secretEl = document.getElementById('secret');
const out = document.getElementById('out');
const btn = document.getElementById('go');

// 密語記在本機，免得每次重打（僅存這台瀏覽器）
secretEl.value = localStorage.getItem('dev_sync_secret') || '';

btn.onclick = async () => {
  const secret = secretEl.value.trim();
  if (!secret) { out.className = 'status err'; out.textContent = '請先輸入通關密語'; return; }
  localStorage.setItem('dev_sync_secret', secret);
  btn.disabled = true;
  out.className = 'status';
  out.textContent = '同步中…';
  try {
    const res = await fetch(API_BASE + '/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Sync-Secret': secret },
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    const c = data.counts || {};
    out.className = 'status ok';
    out.innerHTML = '同步完成 ✓<pre>' + JSON.stringify({
      時間: data.synced_at, 部門: data.department, 範圍: data.range,
      員工: c.employees, 休假: c.leave_records, 假別: c.leave_types, 國定假日: c.holidays,
    }, null, 2) + '</pre>';
  } catch (e) {
    out.className = 'status err';
    out.textContent = '同步失敗：' + (e && e.message ? e.message : e);
  } finally {
    btn.disabled = false;
  }
};
</script>
</body>
</html>
